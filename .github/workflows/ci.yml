name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: justqiu
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d justqiu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/justqiu
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET: ci-test-secret
      APP_ENV: test
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Probe Postgres and Redis connectivity
        run: |
          python - <<'PY'
          import os
          import socket
          import time
          import urllib.parse

          def endpoint(url: str, default_port: int) -> tuple[str, int]:
              parsed = urllib.parse.urlparse(url)
              return parsed.hostname or "127.0.0.1", parsed.port or default_port

          def wait_for(host: str, port: int, label: str) -> None:
              last_error = None
              for attempt in range(1, 31):
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"{label}: reachable at {host}:{port} on attempt {attempt}")
                          return
                  except OSError as exc:
                      last_error = exc
                      print(
                          f"{label}: waiting for {host}:{port} "
                          f"(attempt {attempt}/30): {exc}"
                      )
                      time.sleep(1)

              raise SystemExit(
                  f"{label}: unreachable at {host}:{port} after 30 attempts: {last_error}"
              )

          db_host, db_port = endpoint(os.environ["DATABASE_URL"], 5432)
          redis_host, redis_port = endpoint(os.environ["REDIS_URL"], 6379)

          wait_for(db_host, db_port, "postgres")
          wait_for(redis_host, redis_port, "redis")
          PY

      - name: Run database migrations
        run: cargo run -p justqiu-api --bin migrate

      - name: Test justqiu-auth
        run: cargo test -p justqiu-auth -- --nocapture --test-threads=1

      - name: Test justqiu-redis
        run: cargo test -p justqiu-redis -- --nocapture --test-threads=1

      - name: Test justqiu-callback
        run: cargo test -p justqiu-callback -- --nocapture --test-threads=1

      - name: Test justqiu-qris
        run: cargo test -p justqiu-qris -- --nocapture --test-threads=1

      - name: Test justqiu-nexusggr
        run: cargo test -p justqiu-nexusggr -- --nocapture --test-threads=1

      - name: Test justqiu-api auth
        run: 'cargo test -p justqiu-api http::dashboard::auth::tests:: -- --nocapture --test-threads=1'

      - name: Test justqiu-api bridge
        run: 'cargo test -p justqiu-api http::bridge::tests:: -- --nocapture --test-threads=1'

      - name: Test justqiu-api webhook qris
        run: 'cargo test -p justqiu-api http::webhook::qris::tests:: -- --nocapture --test-threads=1'

      - name: Test justqiu-api webhook disbursement
        run: 'cargo test -p justqiu-api http::webhook::disbursement::tests:: -- --nocapture --test-threads=1'

      - name: Test justqiu-api middleware
        run: 'cargo test -p justqiu-api middleware:: -- --nocapture --test-threads=1'

      - name: Test justqiu-worker
        run: cargo test -p justqiu-worker -- --nocapture --test-threads=1

      - name: Test support crates
        run: cargo test -p justqiu-contracts -p justqiu-database -p justqiu-domain -p justqiu-errors -p justqiu-observability -- --nocapture --test-threads=1

      - name: Build web
        run: npm --prefix apps/web run build
